{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow mt-4">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">📝 How are you feeling today?</h3>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Write about your mood</label>
                        <textarea name="entry_text" class="form-control" rows="6"
                            placeholder="Describe how you're feeling right now..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Analyse My Mood</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
